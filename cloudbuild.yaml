steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "VITE_GOOGLE_CLIENT_ID=$$GOOGLE_CLIENT_ID" > frontend/.env.production
        docker build -t gcr.io/$PROJECT_ID/spendlens .
    secretEnv: ['GOOGLE_CLIENT_ID']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/spendlens'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy spendlens \
          --image=gcr.io/$PROJECT_ID/spendlens \
          --region=asia-southeast1 \
          --platform=managed \
          --allow-unauthenticated \
          --set-env-vars=GEMINI_API_KEY=$$GEMINI_API_KEY,GOOGLE_CLIENT_ID=$$GOOGLE_CLIENT_ID,FIRESTORE_DATABASE_ID=spendlens
    secretEnv: ['GEMINI_API_KEY', 'GOOGLE_CLIENT_ID']

availableSecrets:
  secretManager:
    - versionName: projects/spendlens-492305/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'
    - versionName: projects/spendlens-492305/secrets/GOOGLE_CLIENT_ID/versions/latest
      env: 'GOOGLE_CLIENT_ID'

images:
  - 'gcr.io/$PROJECT_ID/spendlens'
